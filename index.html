<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Atividade Formativa</title>
  </head>
  <body>
    <h1 class="title">Monitoramento Planta Industrial</h1>

    <main class="container">
      <div class="dados">
        <div class="ultimos-dados">
          <h2>Última Temperatura</h2>
          <p class="ultima-temperatura"></p>
        </div>

        <div class="ultimos-dados">
          <h2>Última Umidade</h2>
          <p class="ultima-umidade"></p>
        </div>

        <div class="ultimos-dados">
          <h2>Quantidade</h2>
          <p class="quantidade"></p>
        </div>
      </div>

      <div class="table-nuvem">
        <h2>Dados ThingSpeak</h2>
        <table class="table">
            <thead>
                <th>ID</th>
                <th>Data e Hora</th>
                <th>Entry</th>
                <th>Temperatura</th>
                <th>Umidade</th>
            </thead>
            <tbody>

            </tbody>
        </table>
      </div>


      <div class="table-sql">
        <h2>Dados MySQL</h2>
        <table class="table">
            <thead>
                <th>ID</th>
                <th>Entry</th>
                <th>Data</th>
                <th>Temp.</th>
                <th>Umid.</th>
            </thead>
            <tbody>

            </tbody>
        </table>
      </div>

      <button class="btn-leitura">Nova Leitura</button>
    </main>
  </body>
</html>
